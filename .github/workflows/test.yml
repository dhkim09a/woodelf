name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

# Strategy: prefer a self-hosted runner, fall back to ubuntu-latest if it fails.
# Note: if no self-hosted runner is online, the self-hosted job will queue
# indefinitely. Cancel manually or use workflow_dispatch to bypass.
jobs:
  test-self-hosted:
    name: tests (self-hosted)
    runs-on: self-hosted
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Run tests
        run: pytest tests/ --ignore=tests/test_woodelf.py

  test-cloud:
    name: tests (github-hosted)
    needs: test-self-hosted
    if: ${{ always() && needs.test-self-hosted.result != 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Run tests
        run: pytest tests/ --ignore=tests/test_woodelf.py
