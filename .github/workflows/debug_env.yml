name: debug-env
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: self-hosted
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: verify python
        run: |
          which python
          python --version
          python -c "import sys; print(sys.executable)"
